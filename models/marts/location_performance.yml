models:
  - name: location_performance
    description: Summary of order metrics by location, one row per location.
    columns:
      - name: location_id
        description: The unique key for each location.
        data_tests:
          - not_null
          - unique
      - name: location_name
        description: The name of the location.
      - name: order_count
        description: Total number of orders placed at this location.
        data_tests:
          - not_null
      - name: avg_order
        description: Average order total in dollars for this location.
      - name: total_revenue
        description: Sum of all order totals in dollars for this location.

unit_tests:
  - name: test_safe_divide_handles_zero_orders
    description: "test that divide by zero macro works correctly"
    model: location_performance
    given:
      - input: ref('stg_locations')
        rows:
          - {
            location_id: "abc-123",
            location_name: "test location",
            opened_date: "2020-01-01",
            tax_rate: 0.1
          }
      - input: ref('stg_orders')
        rows: []
      - input: ref('location_regions')
        rows:
          - {location_id: "abc-123",
             region: "test region"}
    expect:
      rows:
        - {location_id: "abc-123",
           location_name: "test location",
           region: "test region",
           order_count: 0,
           avg_order: null,
           total_revenue: null}
semantic_models:
  - name: location_performance
    description: |
      Summary of order metrics by location
    model: ref('location_performance')
    defaults:
    entities:
    - name: location_id
      type: primary
      expr: location_id
    dimensions:
    - name: location_name
      type: categorical
    - name: opened_date
      type: time 
    measures:
    - name: location_order_count
      description: count of orders
      expr: order_count
      agg: count
      agg_time_dimension: opened_date
    - name: avg_order
      description: average order total
      expr: avg_order
      agg: average
      agg_time_dimension: opened_date
    - name: total_revenue
      description: total revenue for a given location
      expr: total_revenue
      agg: sum
      agg_time_dimension: opened_date